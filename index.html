<!DOCTYPE html><html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoinX Forum</title>  <script src="https://cdn.tailwindcss.com"></script>  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #050505;
      overflow-x: hidden;
      color: white;
    }

    .bg-animation {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at top left, rgba(0,255,255,0.15), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,0,100,0.15), transparent 30%),
        #050505;
      animation: pulse 6s infinite alternate;
    }

    @keyframes pulse {
      from {
        filter: hue-rotate(0deg);
      }
      to {
        filter: hue-rotate(40deg);
      }
    }

    .glass {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
    }

    .scrollbar::-webkit-scrollbar {
      width: 6px;
    }

    .scrollbar::-webkit-scrollbar-thumb {
      background: cyan;
      border-radius: 20px;
    }
  </style></head>
<body>
  <div class="bg-animation"></div>  <!-- NAVBAR -->  <nav class="flex justify-between items-center p-4 glass sticky top-0 z-50">
    <div>
      <h1 class="text-3xl font-bold text-cyan-400">CoinX Forum</h1>
    </div><div class="flex gap-4 items-center">
  <button class="hover:text-cyan-400">Buy Data</button>
  <button class="hover:text-cyan-400">Sell Data</button>
  <button class="hover:text-cyan-400">Tasks</button>
  <button class="hover:text-cyan-400">Chat</button>

  <div id="userPanel" class="hidden flex items-center gap-3">
    <span id="username"></span>
    <span class="text-yellow-400">🪙 <span id="balance">0</span></span>
    <button onclick="logout()" class="bg-red-500 px-3 py-1 rounded">Logout</button>
  </div>

  <button id="loginBtn" onclick="openAuth()" class="bg-cyan-500 px-4 py-2 rounded-xl hover:bg-cyan-400">
    Login
  </button>
</div>

  </nav>  <!-- MAIN -->  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4"><!-- LEFT -->
<div class="glass rounded-2xl p-4 h-fit">
  <h2 class="text-xl mb-4 text-cyan-400">Categories</h2>

  <div class="space-y-2">
    <div class="bg-black/30 p-3 rounded-xl hover:bg-cyan-500/20 cursor-pointer">
      Combo
    </div>

    <div class="bg-black/30 p-3 rounded-xl hover:bg-cyan-500/20 cursor-pointer">
      Databases
    </div>

    <div class="bg-black/30 p-3 rounded-xl hover:bg-cyan-500/20 cursor-pointer">
      Streaming
    </div>

    <div class="bg-black/30 p-3 rounded-xl hover:bg-cyan-500/20 cursor-pointer">
      Accounts
    </div>
  </div>
</div>

<!-- CENTER -->
<div class="space-y-4">

  <!-- TASK REWARD -->
  <div class="glass rounded-2xl p-4">
    <h2 class="text-xl text-yellow-400 mb-3">Earn CoinX</h2>

    <p class="text-sm text-gray-400 mb-3">
      Paste TikTok link with hashtags:
      #gaixinh #gainhay
    </p>

    <input
      id="videoLink"
      type="text"
      placeholder="TikTok video URL"
      class="w-full bg-black/40 p-3 rounded-xl outline-none"
    />

    <button
      onclick="submitTask()"
      class="mt-3 bg-yellow-500 hover:bg-yellow-400 text-black px-4 py-2 rounded-xl w-full"
    >
      Check Link (+400 CoinX)
    </button>
  </div>

  <!-- MARKETPLACE -->
  <div class="glass rounded-2xl p-4">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-xl text-cyan-400">Marketplace</h2>

      <button
        onclick="createPost()"
        class="bg-cyan-500 px-4 py-2 rounded-xl"
      >
        Sell Data
      </button>
    </div>

    <div id="posts" class="space-y-3">
    </div>
  </div>
</div>

<!-- RIGHT -->
<div class="glass rounded-2xl p-4 flex flex-col h-[700px]">
  <h2 class="text-xl text-pink-400 mb-4">Global Chat</h2>

  <div
    id="chatBox"
    class="flex-1 overflow-y-auto scrollbar space-y-2 mb-4"
  ></div>

  <div class="flex gap-2">
    <input
      id="chatInput"
      type="text"
      placeholder="Type message..."
      class="flex-1 bg-black/40 p-3 rounded-xl outline-none"
    />

    <button
      onclick="sendMessage()"
      class="bg-pink-500 px-4 rounded-xl"
    >
      Send
    </button>
  </div>
</div>

  </div>  <!-- AUTH MODAL -->  <div
    id="authModal"
    class="hidden fixed inset-0 bg-black/70 flex items-center justify-center"
  >
    <div class="glass p-6 rounded-2xl w-[350px]">
      <h2 class="text-2xl text-cyan-400 mb-4">Login / Register</h2><input
    id="email"
    type="email"
    placeholder="Email"
    class="w-full bg-black/40 p-3 rounded-xl mb-3"
  />

  <input
    id="password"
    type="password"
    placeholder="Password"
    class="w-full bg-black/40 p-3 rounded-xl mb-3"
  />

  <button
    onclick="register()"
    class="w-full bg-cyan-500 py-3 rounded-xl mb-2"
  >
    Register
  </button>

  <button
    onclick="login()"
    class="w-full bg-green-500 py-3 rounded-xl"
  >
    Login
  </button>
</div>

  </div>  <script>
    // =============================
    // FIREBASE CONFIG
    // =============================

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT.appspot.com",
      messagingSenderId: "123456",
      appId: "APP_ID"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser = null;

    // =============================
    // AUTH
    // =============================

    function openAuth() {
      document.getElementById('authModal').classList.remove('hidden');
    }

    async function register() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const res = await auth.createUserWithEmailAndPassword(email, password);

        await db.collection('users').doc(res.user.uid).set({
          email,
          balance: 1600,
          createdAt: Date.now()
        });

        alert('Account created');
      } catch (err) {
        alert(err.message);
      }
    }

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        await auth.signInWithEmailAndPassword(email, password);
        document.getElementById('authModal').classList.add('hidden');
      } catch (err) {
        alert(err.message);
      }
    }

    async function logout() {
      await auth.signOut();
    }

    auth.onAuthStateChanged(async user => {
      if (!user) {
        currentUser = null;
        document.getElementById('loginBtn').classList.remove('hidden');
        document.getElementById('userPanel').classList.add('hidden');
        return;
      }

      currentUser = user;

      const doc = await db.collection('users').doc(user.uid).get();
      const data = doc.data();

      document.getElementById('username').innerText = user.email;
      document.getElementById('balance').innerText = data.balance;

      document.getElementById('loginBtn').classList.add('hidden');
      document.getElementById('userPanel').classList.remove('hidden');
    });

    // =============================
    // MARKETPLACE
    // =============================

    async function createPost() {
      if (!currentUser) {
        return alert('Login first');
      }

      const title = prompt('Post title');
      const description = prompt('Description');
      const price = prompt('Price');

      if (!title) return;

      await db.collection('posts').add({
        title,
        description,
        price,
        seller: currentUser.email,
        createdAt: Date.now()
      });
    }

    db.collection('posts')
      .orderBy('createdAt', 'desc')
      .onSnapshot(snapshot => {

        const posts = document.getElementById('posts');
        posts.innerHTML = '';

        snapshot.forEach(doc => {
          const p = doc.data();

          posts.innerHTML += `
            <div class="bg-black/30 p-4 rounded-2xl border border-cyan-500/20 hover:border-cyan-400 transition-all">
              <div class="flex justify-between items-center mb-2">
                <h3 class="text-lg text-cyan-300">${p.title}</h3>
                <span class="text-yellow-400">🪙 ${p.price}</span>
              </div>

              <p class="text-gray-300 mb-2">${p.description}</p>

              <div class="flex justify-between items-center text-sm text-gray-400">
                <span>${p.seller}</span>
                <button class="bg-cyan-500 px-3 py-1 rounded-xl">
                  Buy
                </button>
              </div>
            </div>
          `;
        });
      });

    // =============================
    // CHAT
    // =============================

    async function sendMessage() {
      if (!currentUser) {
        return alert('Login first');
      }

      const input = document.getElementById('chatInput');
      const message = input.value.trim();

      if (!message) return;

      await db.collection('globalChat').add({
        user: currentUser.email,
        message,
        createdAt: Date.now()
      });

      input.value = '';
    }

    db.collection('globalChat')
      .orderBy('createdAt', 'asc')
      .onSnapshot(snapshot => {

        const chatBox = document.getElementById('chatBox');
        chatBox.innerHTML = '';

        snapshot.forEach(doc => {
          const c = doc.data();

          chatBox.innerHTML += `
            <div class="bg-black/30 p-3 rounded-xl">
              <div class="text-cyan-400 text-sm mb-1">${c.user}</div>
              <div>${c.message}</div>
            </div>
          `;
        });

        chatBox.scrollTop = chatBox.scrollHeight;
      });

    // =============================
    // TASK REWARD
    // =============================

    async function submitTask() {
      if (!currentUser) {
        return alert('Login first');
      }

      const link = document.getElementById('videoLink').value;

      if (!link.includes('tiktok')) {
        return alert('Invalid TikTok link');
      }

      const ok = confirm(
        'Did video contain #gaixinh and #gainhay ?'
      );

      if (!ok) {
        return alert('Task failed');
      }

      const userRef = db.collection('users').doc(currentUser.uid);

      const doc = await userRef.get();
      const balance = doc.data().balance || 0;

      await userRef.update({
        balance: balance + 400
      });

      await db.collection('rewardLogs').add({
        uid: currentUser.uid,
        link,
        reward: 400,
        createdAt: Date.now()
      });

      document.getElementById('balance').innerText = balance + 400;

      alert('+400 CoinX');
    }
  </script></body>
</html>
