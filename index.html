<!DOCTYPE html>
<html lang="vi" oncontextmenu="return false;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 ANONYMOUS | White Hat Portal</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap');
        body { background: #050810; color: #00ff41; font-family: 'IBM Plex Mono', monospace; user-select: none; }
        .cyber-panel { background: rgba(10, 14, 39, 0.95); border: 1px solid #00ff41; border-radius: 8px; box-shadow: 0 0 15px rgba(0, 255, 65, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect } = React;
    
    // CẤU HÌNH FIREBASE (Dán config của bạn vào đây)
    const firebaseConfig = { databaseURL: "https://your-project-id.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function App() {
        const [user, setUser] = useState(null);
        const [coins, setCoins] = useState(0);
        const [messages, setMessages] = useState([]);
        const [tab, setTab] = useState('chat');

        // Đăng nhập giả lập
        const handleLogin = (e) => {
            e.preventDefault();
            if(e.target.pass.value === "admin") setUser("Hacker_" + Math.floor(Math.random()*999));
        };

        // Gửi link kiếm Coin
        const submitMission = (link) => {
            if(link.includes('tiktok.com') && (link.includes('#hack') || link.includes('tech'))) {
                const newCoins = coins + 10000;
                setCoins(newCoins);
                alert("MISSION SUCCESS: +10,000 CoinX");
            } else {
                alert("ACCESS DENIED: Invalid Source/Tag");
            }
        };

        if(!user) return (
            <div className="flex justify-center items-center h-screen">
                <form onSubmit={handleLogin} className="cyber-panel p-8 w-80 text-center">
                    <h2 className="mb-4">AUTHENTICATION</h2>
                    <input name="pass" type="password" className="bg-black border w-full p-2 mb-4 text-center" placeholder="PASSWORD" />
                    <button className="border px-4 py-2 hover:bg-[#00ff41] hover:text-black">CONNECT</button>
                </form>
            </div>
        );

        return (
            <div className="max-w-4xl mx-auto p-4">
                <header className="flex justify-between mb-8">
                    <div>Welcome: <span className="text-white">{user}</span></div>
                    <div>COINX: <span className="text-[#00ff41]">{coins}</span></div>
                </header>

                <div className="flex gap-4 mb-4">
                    <button onClick={() => setTab('chat')} className="border px-4 py-1">GLOBAL CHAT</button>
                    <button onClick={() => setTab('earn')} className="border px-4 py-1">EARN COINX</button>
                </div>

                <main className="cyber-panel p-6 min-h-[300px]">
                    {tab === 'chat' && <div className="text-sm">Public Channel: No data yet.</div>}
                    {tab === 'earn' && (
                        <div>
                            <p className="mb-4">Submit TikTok Link (#hack / Tech):</p>
                            <input id="tiktokLink" className="bg-black border w-full p-2 mb-2" />
                            <button onClick={() => submitMission(document.getElementById('tiktokLink').value)} className="border p-2">SUBMIT MISSION</button>
                        </div>
                    )}
                </main>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
    </script>

    <script>
        // Chặn copy/inspect
        document.addEventListener('keydown', e => { if(e.keyCode === 123) e.preventDefault(); });
        document.addEventListener('copy', e => e.preventDefault());
    </script>
</body>
</html>
