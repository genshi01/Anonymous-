<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎭 ANONYMOUS - Fake Data Marketplace</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap');

        :root {
            --primary: #00ff41;
            --primary-dark: #00cc33;
            --secondary: #ff006e;
            --tertiary: #00d9ff;
            --dark-bg: #0a0e27;
            --darker-bg: #050810;
            --text-light: #e0e0e0;
            --text-muted: #808080;
            --border-color: #1a2540;
            --accent: #ffd60a;
        }

        body {
            background: linear-gradient(135deg, var(--darker-bg) 0%, #1a0033 100%);
            color: var(--text-light);
            font-family: 'IBM Plex Mono', monospace;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 65, 0.02) 0px,
                    rgba(0, 255, 65, 0.02) 1px,
                    transparent 1px,
                    transparent 2px
                );
            pointer-events: none;
            z-index: 1;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.27; }
            5% { opacity: 0.3; }
            10% { opacity: 0.27; }
            100% { opacity: 0.27; }
        }

        #root {
            position: relative;
            z-index: 2;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            background: linear-gradient(180deg, rgba(10, 14, 39, 0.95) 0%, rgba(26, 37, 64, 0.5) 100%);
            border-bottom: 2px solid var(--primary);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            color: var(--primary);
            text-shadow: 0 0 10px var(--primary), 0 0 20px rgba(0, 255, 65, 0.5);
            letter-spacing: 2px;
            cursor: pointer;
        }

        .logo:hover {
            text-shadow: 0 0 20px var(--primary), 0 0 40px rgba(0, 255, 65, 0.8);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .coin-display {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 65, 0.1);
            padding: 8px 16px;
            border: 1px solid var(--primary);
            border-radius: 5px;
            font-weight: bold;
            color: var(--primary);
        }

        .coin-icon {
            font-size: 18px;
        }

        .auth-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            border: none;
            cursor: pointer;
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 3px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--darker-bg);
            border: 2px solid var(--primary);
        }

        .btn-primary:hover {
            background: var(--darker-bg);
            color: var(--primary);
            box-shadow: 0 0 15px var(--primary);
        }

        .btn-secondary {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .btn-secondary:hover {
            background: var(--primary);
            color: var(--darker-bg);
        }

        /* MAIN CONTENT */
        main {
            padding: 40px 0;
        }

        .hero {
            text-align: center;
            margin-bottom: 60px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 48px;
            margin-bottom: 20px;
            color: var(--primary);
            text-shadow: 0 0 20px var(--primary);
            letter-spacing: 3px;
        }

        .hero p {
            font-size: 16px;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* TAB NAVIGATION */
        .tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 20px;
            overflow-x: auto;
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            position: relative;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -21px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* MARKETPLACE GRID */
        .marketplace-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .data-card {
            background: linear-gradient(135deg, rgba(26, 37, 64, 0.6) 0%, rgba(40, 20, 60, 0.4) 100%);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .data-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.1), transparent);
            transition: left 0.5s;
        }

        .data-card:hover {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2), inset 0 0 20px rgba(0, 255, 65, 0.05);
            transform: translateY(-5px);
        }

        .data-card:hover::before {
            left: 100%;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .device-name {
            font-weight: bold;
            color: var(--tertiary);
            font-size: 16px;
        }

        .device-model {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 5px;
        }

        .price-tag {
            background: var(--secondary);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        .card-body {
            margin-bottom: 15px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            color: var(--primary);
        }

        .card-footer {
            display: flex;
            gap: 10px;
        }

        .btn-buy {
            flex: 1;
            background: var(--primary);
            color: var(--darker-bg);
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-buy:hover {
            background: var(--primary-dark);
            box-shadow: 0 0 15px var(--primary);
        }

        .btn-view {
            flex: 1;
            background: transparent;
            color: var(--tertiary);
            border: 2px solid var(--tertiary);
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .btn-view:hover {
            background: var(--tertiary);
            color: var(--darker-bg);
        }

        /* CREATE LISTING FORM */
        .form-container {
            background: linear-gradient(135deg, rgba(26, 37, 64, 0.8) 0%, rgba(40, 20, 60, 0.6) 100%);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-light);
            font-family: 'IBM Plex Mono', monospace;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            animation: modalIn 0.3s ease-out;
        }

        .modal.active {
            display: flex;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(10, 14, 39, 0.98) 0%, rgba(40, 20, 60, 0.8) 100%);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.2);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 28px;
            cursor: pointer;
            padding: 0;
        }

        .close-btn:hover {
            transform: scale(1.2);
        }

        /* LEADERBOARD */
        .leaderboard-container {
            background: linear-gradient(135deg, rgba(26, 37, 64, 0.8) 0%, rgba(40, 20, 60, 0.6) 100%);
            border: 2px solid var(--primary);
            border-radius: 8px;
            overflow: hidden;
            max-width: 600px;
            margin: 0 auto;
        }

        .leaderboard-header {
            background: rgba(0, 255, 65, 0.1);
            padding: 20px;
            border-bottom: 2px solid var(--primary);
        }

        .leaderboard-header h2 {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
        }

        .leaderboard-item {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
            transition: background 0.3s;
        }

        .leaderboard-item:hover {
            background: rgba(0, 255, 65, 0.05);
        }

        .rank {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary);
            min-width: 40px;
        }

        .rank.top1 { color: var(--accent); }
        .rank.top2 { color: var(--tertiary); }
        .rank.top3 { color: var(--secondary); }

        .user-item {
            flex: 1;
        }

        .user-name {
            color: var(--text-light);
            font-weight: bold;
        }

        .user-sales {
            color: var(--text-muted);
            font-size: 12px;
        }

        .user-coins {
            color: var(--primary);
            font-weight: bold;
            font-size: 16px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }

            .marketplace-grid {
                grid-template-columns: 1fr;
            }

            .header-content {
                flex-direction: column;
                gap: 15px;
            }

            .user-info {
                width: 100%;
                justify-content: space-between;
                gap: 15px;
            }
        }

        /* ===== CHAT SYSTEM ===== */
        .chat-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            height: 600px;
        }

        .chat-sidebar {
            background: linear-gradient(180deg, rgba(5, 8, 16, 0.9) 0%, rgba(26, 37, 64, 0.6) 100%);
            border: 2px solid var(--primary);
            border-radius: 8px;
            padding: 20px;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1), inset 0 0 20px rgba(0, 255, 65, 0.02);
        }

        .sidebar-title {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary);
        }

        .conversation-item {
            padding: 12px;
            margin-bottom: 10px;
            background: rgba(0, 255, 65, 0.05);
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .conversation-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 65, 0.2), transparent);
            transition: left 0.5s;
        }

        .conversation-item:hover {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2), inset 0 0 10px rgba(0, 255, 65, 0.05);
            transform: translateX(5px);
        }

        .conversation-item:hover::before {
            left: 100%;
        }

        .conversation-item.active {
            background: rgba(0, 255, 65, 0.15);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.3);
        }

        .conversation-name {
            color: var(--text-light);
            font-weight: bold;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .conversation-preview {
            color: var(--text-muted);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .conversation-time {
            color: var(--primary);
            font-size: 10px;
            margin-top: 4px;
        }

        .chat-main {
            background: linear-gradient(135deg, rgba(5, 8, 16, 0.95) 0%, rgba(26, 37, 64, 0.7) 100%);
            border: 2px solid var(--primary);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
        }

        .chat-header {
            background: rgba(0, 255, 65, 0.08);
            border-bottom: 2px solid var(--primary);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header-info h3 {
            color: var(--primary);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--primary);
        }

        .chat-header-info p {
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 4px;
        }

        .chat-status {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            font-size: 11px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--primary);
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.3; }
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: messageSlide 0.4s ease-out;
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 4px;
            background: linear-gradient(135deg, var(--primary), var(--tertiary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .message-content {
            max-width: 60%;
        }

        .message.own .message-content {
            max-width: 70%;
        }

        .message-bubble {
            background: rgba(0, 255, 65, 0.1);
            border: 1px solid var(--primary);
            border-radius: 4px;
            padding: 12px 16px;
            color: var(--text-light);
            font-size: 13px;
            line-height: 1.4;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.1);
            position: relative;
            word-break: break-word;
        }

        .message.own .message-bubble {
            background: rgba(0, 217, 255, 0.1);
            border-color: var(--tertiary);
            box-shadow: 0 0 10px rgba(0, 217, 255, 0.1);
        }

        .message-time {
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 6px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            height: 20px;
            align-items: center;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
            box-shadow: 0 0 5px var(--primary);
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.7;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .chat-input-area {
            border-top: 2px solid var(--primary);
            padding: 15px 20px;
            background: rgba(0, 255, 65, 0.03);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px 12px;
            color: var(--text-light);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            transition: all 0.3s;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            padding: 10px 20px;
            background: var(--primary);
            color: var(--darker-bg);
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .send-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s;
        }

        .send-btn:hover {
            background: var(--primary-dark);
            box-shadow: 0 0 15px var(--primary);
            transform: translateY(-2px);
        }

        .send-btn:hover::before {
            left: 100%;
        }

        .send-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 1024px) {
            .chat-container {
                grid-template-columns: 1fr;
                height: auto;
            }

            .chat-sidebar {
                max-height: 150px;
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
                align-content: start;
            }

            .conversation-item {
                margin: 0;
            }

            .message-content {
                max-width: 85% !important;
            }
        }

        /* SCROLLBAR STYLING */
        .messages-container::-webkit-scrollbar,
        .chat-sidebar::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track,
        .chat-sidebar::-webkit-scrollbar-track {
            background: rgba(0, 255, 65, 0.05);
        }

        .messages-container::-webkit-scrollbar-thumb,
        .chat-sidebar::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.3);
        }

        .messages-container::-webkit-scrollbar-thumb:hover,
        .chat-sidebar::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }
    </style>
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Data Sample
        const fakeDumps = [
            {
                id: 1,
                deviceName: '🎭GENSHI.LEVI🦅',
                model: 'Redmi Note 13 4G',
                chip: 'Snapdragon 685',
                storage: '73.7GB/128GB',
                ram: '8GB',
                apps: 42,
                price: 500,
                seller: 'GenShiHacker',
                rating: 4.8
            },
            {
                id: 2,
                deviceName: 'iPhone Pro Max',
                model: 'Apple iPhone 15 Pro Max',
                chip: 'A17 Pro',
                storage: '256GB/256GB',
                ram: '8GB',
                apps: 187,
                price: 1200,
                seller: 'CyberNinja',
                rating: 4.9
            },
            {
                id: 3,
                deviceName: 'Samsung Galaxy S24',
                model: 'Samsung Galaxy S24 Ultra',
                chip: 'Snapdragon 8 Gen 3',
                storage: '512GB/512GB',
                ram: '12GB',
                apps: 156,
                price: 800,
                seller: 'DataHunter',
                rating: 4.7
            },
            {
                id: 4,
                deviceName: 'OnePlus 12',
                model: 'OnePlus 12 Pro',
                chip: 'Snapdragon 8 Gen 3 Leading',
                storage: '256GB/256GB',
                ram: '16GB',
                apps: 89,
                price: 600,
                seller: 'PhantomX',
                rating: 4.6
            }
        ];

        const leaderboardData = [
            { rank: 1, name: 'CyberNinja', sales: 47, coins: 28500 },
            { rank: 2, name: 'DataHunter', sales: 42, coins: 25200 },
            { rank: 3, name: 'GenShiHacker', sales: 38, coins: 22800 },
            { rank: 4, name: 'PhantomX', sales: 31, coins: 18600 },
            { rank: 5, name: 'ShadowCode', sales: 28, coins: 16800 }
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('marketplace');
            const [userCoins, setUserCoins] = useState(5000);
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [username, setUsername] = useState('');
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('login');
            const [formData, setFormData] = useState({
                deviceName: '',
                model: '',
                chip: '',
                storage: '',
                price: '',
                description: ''
            });

            // Chat States
            const [activeChat, setActiveChat] = useState(0);
            const [messages, setMessages] = useState({
                0: [
                    { id: 1, sender: 'CyberNinja', text: '🎭GENSHI.LEVI🦅 dump xịn lắm bác', time: '14:32', own: false },
                    { id: 2, sender: 'you', text: 'Thanks, đó là real data from my device 😄', time: '14:33', own: true },
                    { id: 3, sender: 'CyberNinja', text: 'Còn device khác không? Tôi muốn mua thêm', time: '14:35', own: false },
                ],
                1: [
                    { id: 1, sender: 'DataHunter', text: 'Giá 800 CoinX có ok không?', time: '10:20', own: false },
                ],
                2: [
                    { id: 1, sender: 'PhantomX', text: 'Bạn có file JSON full không?', time: '09:15', own: false },
                ]
            });
            const [chatInput, setChatInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            const chatUsers = [
                { id: 0, name: 'CyberNinja', status: 'online', lastMsg: 'Còn device khác không?', time: '14:35' },
                { id: 1, name: 'DataHunter', status: 'online', lastMsg: 'Giá 800 CoinX có ok không?', time: '10:20' },
                { id: 2, name: 'PhantomX', status: 'away', lastMsg: 'Bạn có file JSON full không?', time: '09:15' }
            ];

            const handleLogin = (e) => {
                e.preventDefault();
                if (username.trim()) {
                    setIsLoggedIn(true);
                    setShowModal(false);
                    setUsername(username);
                }
            };

            const handleBuy = (dump) => {
                if (userCoins >= dump.price) {
                    setUserCoins(userCoins - dump.price);
                    alert(`✅ Mua thành công! Bạn đã nhận ${dump.deviceName} dump\n💰 Còn lại: ${userCoins - dump.price} CoinX`);
                } else {
                    alert('❌ CoinX không đủ!');
                }
            };

            const handleCreateListing = (e) => {
                e.preventDefault();
                if (formData.deviceName && formData.price) {
                    setUserCoins(userCoins + parseInt(formData.price));
                    alert(`✅ Listing tạo thành công!\n💰 Bạn nhận được ${formData.price} CoinX`);
                    setFormData({
                        deviceName: '',
                        model: '',
                        chip: '',
                        storage: '',
                        price: '',
                        description: ''
                    });
                    setActiveTab('marketplace');
                }
            };

            const handleSendMessage = (e) => {
                e.preventDefault();
                if (chatInput.trim()) {
                    const newMessage = {
                        id: (messages[activeChat]?.length || 0) + 1,
                        sender: 'you',
                        text: chatInput,
                        time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }),
                        own: true
                    };
                    setMessages({
                        ...messages,
                        [activeChat]: [...(messages[activeChat] || []), newMessage]
                    });
                    setChatInput('');

                    // Simulate typing response
                    setIsTyping(true);
                    setTimeout(() => {
                        const response = {
                            id: (messages[activeChat]?.length || 0) + 2,
                            sender: chatUsers[activeChat].name,
                            text: '👍 Đã nhận. Tôi sẽ kiểm tra và phản hồi lại ngay!',
                            time: new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }),
                            own: false
                        };
                        setMessages(prev => ({
                            ...prev,
                            [activeChat]: [...(prev[activeChat] || []), response]
                        }));
                        setIsTyping(false);
                    }, 1500);
                }
            };

            const getRankClass = (rank) => {
                if (rank === 1) return 'top1';
                if (rank === 2) return 'top2';
                if (rank === 3) return 'top3';
                return '';
            };

            return (
                <>
                    <header>
                        <div className="container">
                            <div className="header-content">
                                <div className="logo" onClick={() => setActiveTab('marketplace')}>
                                    🎭 ANONYMOUS
                                </div>
                                <div className="user-info">
                                    <div className="coin-display">
                                        <span className="coin-icon">💰</span>
                                        <span>{userCoins} CoinX</span>
                                    </div>
                                    <div className="auth-buttons">
                                        {!isLoggedIn ? (
                                            <>
                                                <button className="btn-secondary" onClick={() => { setModalType('login'); setShowModal(true); }}>
                                                    Đăng nhập
                                                </button>
                                                <button className="btn-primary" onClick={() => { setModalType('register'); setShowModal(true); }}>
                                                    Đăng ký
                                                </button>
                                            </>
                                        ) : (
                                            <>
                                                <span style={{ color: '#00d9ff' }}>👤 {username}</span>
                                                <button className="btn-secondary" onClick={() => setIsLoggedIn(false)}>
                                                    Đăng xuất
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="container">
                        <div className="hero">
                            <h1>FAKE DATA MARKETPLACE</h1>
                            <p>Mua bán device dumps ảo - Kiếm CoinX miễn phí 🔥</p>
                        </div>

                        <div className="tabs">
                            <button className={`tab ${activeTab === 'marketplace' ? 'active' : ''}`} onClick={() => setActiveTab('marketplace')}>
                                📊 Marketplace
                            </button>
                            <button className={`tab ${activeTab === 'create' ? 'active' : ''}`} onClick={() => setActiveTab('create')}>
                                ➕ Tạo Listing
                            </button>
                            <button className={`tab ${activeTab === 'leaderboard' ? 'active' : ''}`} onClick={() => setActiveTab('leaderboard')}>
                                🏆 Leaderboard
                            </button>
                            <button className={`tab ${activeTab === 'chat' ? 'active' : ''}`} onClick={() => setActiveTab('chat')}>
                                💬 Chat System
                            </button>
                        </div>

                        {activeTab === 'marketplace' && (
                            <div className="marketplace-grid">
                                {fakeDumps.map(dump => (
                                    <div key={dump.id} className="data-card">
                                        <div className="card-header">
                                            <div>
                                                <div className="device-name">{dump.deviceName}</div>
                                                <div className="device-model">{dump.model}</div>
                                            </div>
                                            <div className="price-tag">{dump.price} CoinX</div>
                                        </div>
                                        <div className="card-body">
                                            <div className="stat">
                                                <span className="stat-label">Chip:</span>
                                                <span className="stat-value">{dump.chip}</span>
                                            </div>
                                            <div className="stat">
                                                <span className="stat-label">Storage:</span>
                                                <span className="stat-value">{dump.storage}</span>
                                            </div>
                                            <div className="stat">
                                                <span className="stat-label">RAM:</span>
                                                <span className="stat-value">{dump.ram}</span>
                                            </div>
                                            <div className="stat">
                                                <span className="stat-label">Apps:</span>
                                                <span className="stat-value">{dump.apps}</span>
                                            </div>
                                            <div className="stat">
                                                <span className="stat-label">Seller:</span>
                                                <span className="stat-value">{dump.seller}</span>
                                            </div>
                                            <div className="stat">
                                                <span className="stat-label">Rating:</span>
                                                <span className="stat-value">⭐ {dump.rating}</span>
                                            </div>
                                        </div>
                                        <div className="card-footer">
                                            <button className="btn-buy" onClick={() => handleBuy(dump)}>
                                                💳 MUA
                                            </button>
                                            <button className="btn-view">👁 XEM</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'create' && (
                            <div className="form-container">
                                <h2 style={{ color: '#00ff41', marginBottom: '20px', fontFamily: 'Orbitron, sans-serif' }}>
                                    ➕ TẠO LISTING MỚI
                                </h2>
                                <form onSubmit={handleCreateListing}>
                                    <div className="form-group">
                                        <label>📱 Tên thiết bị</label>
                                        <input
                                            type="text"
                                            placeholder="VD: 🎭GENSHI.LEVI🦅"
                                            value={formData.deviceName}
                                            onChange={(e) => setFormData({...formData, deviceName: e.target.value})}
                                            required
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>🏷️ Model</label>
                                        <input
                                            type="text"
                                            placeholder="VD: Redmi Note 13 4G"
                                            value={formData.model}
                                            onChange={(e) => setFormData({...formData, model: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>⚙️ Chip</label>
                                        <input
                                            type="text"
                                            placeholder="VD: Snapdragon 685"
                                            value={formData.chip}
                                            onChange={(e) => setFormData({...formData, chip: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>💾 Storage</label>
                                        <input
                                            type="text"
                                            placeholder="VD: 128GB"
                                            value={formData.storage}
                                            onChange={(e) => setFormData({...formData, storage: e.target.value})}
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>💰 Giá (CoinX)</label>
                                        <input
                                            type="number"
                                            placeholder="VD: 500"
                                            value={formData.price}
                                            onChange={(e) => setFormData({...formData, price: e.target.value})}
                                            required
                                        />
                                    </div>
                                    <div className="form-group">
                                        <label>📝 Mô tả</label>
                                        <textarea
                                            placeholder="Mô tả chi tiết về device dump..."
                                            rows="4"
                                            value={formData.description}
                                            onChange={(e) => setFormData({...formData, description: e.target.value})}
                                        ></textarea>
                                    </div>
                                    <button type="submit" className="btn-primary" style={{ width: '100%' }}>
                                        ✅ TẠO LISTING
                                    </button>
                                </form>
                            </div>
                        )}

                        {activeTab === 'leaderboard' && (
                            <div className="leaderboard-container">
                                <div className="leaderboard-header">
                                    <h2>🏆 TOP SELLERS</h2>
                                </div>
                                {leaderboardData.map(item => (
                                    <div key={item.rank} className="leaderboard-item">
                                        <div className={`rank ${getRankClass(item.rank)}`}>
                                            {item.rank === 1 ? '🥇' : item.rank === 2 ? '🥈' : item.rank === 3 ? '🥉' : `#${item.rank}`}
                                        </div>
                                        <div className="user-item">
                                            <div className="user-name">{item.name}</div>
                                            <div className="user-sales">💼 {item.sales} sales</div>
                                        </div>
                                        <div className="user-coins">{item.coins.toLocaleString()} 💰</div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {activeTab === 'chat' && (
                            <div className="chat-container">
                                <div className="chat-sidebar">
                                    <div className="sidebar-title">💬 Conversations</div>
                                    {chatUsers.map((user, idx) => (
                                        <div
                                            key={user.id}
                                            className={`conversation-item ${activeChat === idx ? 'active' : ''}`}
                                            onClick={() => setActiveChat(idx)}
                                        >
                                            <div className="conversation-name">{user.name}</div>
                                            <div className="conversation-preview">{user.lastMsg}</div>
                                            <div className="conversation-time">{user.time}</div>
                                        </div>
                                    ))}
                                </div>

                                <div className="chat-main">
                                    <div className="chat-header">
                                        <div className="chat-header-info">
                                            <h3>💬 {chatUsers[activeChat]?.name}</h3>
                                            <p>{chatUsers[activeChat]?.status === 'online' ? '🟢 Online' : '🟡 Away'}</p>
                                        </div>
                                        <div className="chat-status">
                                            <span className="status-dot"></span>
                                            {chatUsers[activeChat]?.status === 'online' ? 'Active now' : 'Away'}
                                        </div>
                                    </div>

                                    <div className="messages-container">
                                        {messages[activeChat]?.map((msg, idx) => (
                                            <div key={msg.id} className={`message ${msg.own ? 'own' : ''}`}>
                                                {!msg.own && <div className="message-avatar">{msg.sender.charAt(0)}</div>}
                                                <div className="message-content">
                                                    <div className="message-bubble">{msg.text}</div>
                                                    <div className="message-time">{msg.time}</div>
                                                </div>
                                                {msg.own && <div className="message-avatar">👤</div>}
                                            </div>
                                        ))}
                                        {isTyping && (
                                            <div className="message">
                                                <div className="message-avatar">{chatUsers[activeChat]?.name.charAt(0)}</div>
                                                <div className="message-content">
                                                    <div className="typing-indicator">
                                                        <div className="typing-dot"></div>
                                                        <div className="typing-dot"></div>
                                                        <div className="typing-dot"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    <div className="chat-input-area">
                                        <form onSubmit={handleSendMessage} style={{ display: 'flex', gap: '10px', width: '100%' }}>
                                            <input
                                                type="text"
                                                className="chat-input"
                                                placeholder="Nhập tin nhắn..."
                                                value={chatInput}
                                                onChange={(e) => setChatInput(e.target.value)}
                                            />
                                            <button type="submit" className="send-btn">
                                                📤 GỬI
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* LOGIN/REGISTER MODAL */}
                    <div className={`modal ${showModal ? 'active' : ''}`} onClick={() => setShowModal(false)}>
                        <div className="modal-content" onClick={(e) => e.stopPropagation()}>
                            <div className="modal-header">
                                <h2>{modalType === 'login' ? '🔐 Đăng nhập' : '📝 Đăng ký'}</h2>
                                <button className="close-btn" onClick={() => setShowModal(false)}>×</button>
                            </div>
                            <form onSubmit={handleLogin}>
                                <div className="form-group">
                                    <label>👤 Username</label>
                                    <input
                                        type="text"
                                        placeholder="Nhập username..."
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        required
                                    />
                                </div>
                                {modalType === 'register' && (
                                    <div className="form-group">
                                        <label>🔑 Password</label>
                                        <input type="password" placeholder="Nhập password..." />
                                    </div>
                                )}
                                <button type="submit" className="btn-primary" style={{ width: '100%' }}>
                                    {modalType === 'login' ? '🔐 Đăng nhập' : '📝 Đăng ký'}
                                </button>
                            </form>
                        </div>
                    </div>
                </>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
