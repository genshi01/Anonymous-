<!DOCTYPE html>
<html lang="vi" oncontextmenu="return false;">
<head>
    <meta charset="UTF-8">
    <title>🎭 ANONYMOUS - Secure Marketplace</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* CSS Cơ bản - Chặn chọn văn bản */
        body { user-select: none; background: #0a0e27; color: #00ff41; font-family: monospace; }
        .empty-state { border: 1px dashed #00ff41; padding: 20px; text-align: center; margin: 20px; }
        .chat-box { height: 300px; border: 1px solid #00ff41; overflow-y: scroll; margin-bottom: 10px; padding: 10px; }
    </style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState } = React;

function App() {
    const [coins, setCoins] = useState(0);
    const [messages, setMessages] = useState([{user: "System", text: "Chào mừng đến diễn đàn!"}]);
    const [listings, setListings] = useState([]); // Trống để hiển thị trạng thái chưa có dữ liệu

    // 1. Tính năng kiếm CoinX
    const submitVideo = (link) => {
        if(link.includes("tiktok.com") && link.includes("#hack")) {
            setCoins(coins + 10000);
            alert("Thành công! Bạn đã nhận 10.000 CoinX.");
        } else {
            alert("Lỗi: Link không hợp lệ hoặc thiếu #hack");
        }
    };

    return (
        <div className="container">
            <h1>Số dư CoinX: {coins}</h1>
            
            {/* Nhiệm vụ */}
            <div className="task-section">
                <input id="tiktokLink" placeholder="Dán link TikTok #hack tại đây" />
                <button onClick={() => submitVideo(document.getElementById('tiktokLink').value)}>Gửi Video</button>
            </div>

            {/* Marketplace Logic */}
            <section>
                <h2>Chợ dữ liệu</h2>
                {listings.length === 0 ? (
                    <div className="empty-state">Hiện tại chưa có dữ liệu nào được đăng bán.</div>
                ) : (
                    <div>/* Danh sách dữ liệu */</div>
                )}
            </section>

            {/* Chat Toàn Cục */}
            <div className="chat-main">
                <div className="chat-box">
                    {messages.map((msg, i) => <p key={i}><b>{msg.user}:</b> {msg.text}</p>)}
                </div>
                <input onKeyDown={(e) => {
                    if(e.key === 'Enter') {
                        setMessages([...messages, {user: "Bạn", text: e.target.value}]);
                        e.target.value = '';
                    }
                }} placeholder="Nhập tin nhắn..." />
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
    // Chặn Copy / Paste / Cut
    document.addEventListener('copy', (e) => e.preventDefault());
    document.addEventListener('paste', (e) => e.preventDefault());
    document.addEventListener('cut', (e) => e.preventDefault());
</script>

</body>
</html>
